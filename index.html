<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Import map for Custom Code landing pages (Added Admin, Landing Pages,
      Custom Code). Compiled custom bundles import "react" etc. as bare
      specifiers; this resolves them to a shared CDN copy, kept completely
      separate from the app's own bundled React (see CustomPageRenderer.jsx
      and ThemePreviewModal.jsx for why they must not share an instance).
      Must stay the very first module-type tag in this document, before
      Vite's own injected entry script -- do not move this block.
    -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
          "react-dom": "https://esm.sh/react-dom@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client"
        }
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="https://addededucation.com/addedapi/uploads/addededucation-assets/asset_1783998674543_Untitled_design__3_.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AddedEducation</title>
    <meta name="description" content="AddedEducation helps high-achieving students gain admission to top universities worldwide through personalized counseling, research programs, and athletic consulting." />
    <!-- LCP hero image preload -->
    <link rel="preload" as="image" fetchpriority="high" href="https://addededucation.com/addedapi/uploads/addededucation-assets/asset_1782658947407_vRwqcjkjJJvZusEeq6lojyQAW3s.png" />
    <!-- Fraunces self-hosted — eliminates Google Fonts render-blocking chain -->
    <!-- Preload italic+normal latin (hero h1 uses these — critical for LCP) -->
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/fr-i-latin.woff2" />
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/fr-n-latin.woff2" />
    <!-- Inter + JetBrains + DM Sans: async, non-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;350;400;450;500;600&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;350;400;450;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" /></noscript>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-text-size-adjust: 100%; }
      body { background: #0E0E0E; color: #fff; font-family: 'Inter', Georgia, sans-serif; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; }
      /* Prevent CLS: reserve hero height so content below doesn't jump */
      body { min-height: 100vh; }
      /* Fraunces self-hosted — served from our own CDN, zero external dependency */
      @font-face {
        font-family: 'Fraunces';
        font-style: normal;
        font-weight: 300 400;
        font-display: optional;
        src: url('/fonts/fr-n-latin-ext.woff2') format('woff2');
        unicode-range: U+0100-024F, U+0259, U+1E00-1EFF, U+2020, U+20A0-20AB, U+20AD-20CF, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: 'Fraunces';
        font-style: normal;
        font-weight: 300 400;
        font-display: optional;
        src: url('/fonts/fr-n-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Fraunces';
        font-style: italic;
        font-weight: 300 400;
        font-display: optional;
        src: url('/fonts/fr-i-latin-ext.woff2') format('woff2');
        unicode-range: U+0100-024F, U+0259, U+1E00-1EFF, U+2020, U+20A0-20AB, U+20AD-20CF, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: 'Fraunces';
        font-style: italic;
        font-weight: 300 400;
        font-display: optional;
        src: url('/fonts/fr-i-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      /* Fallback — same metrics for zero-shift when Fraunces is cached */
      @font-face {
        font-family: 'Fraunces-fallback';
        src: local('Georgia'), local('Times New Roman');
        size-adjust: 108%;
        ascent-override: 88%;
        descent-override: 20%;
        line-gap-override: 0%;
      }
      /* Static hero shell — paints LCP immediately while React loads */
      .__hero-shell {
        position: fixed; inset: 0; z-index: 9999;
        width: 100%; min-height: 100vh; background: #0E0E0E;
        overflow: hidden; contain: layout style paint;
      }
      .__hero-shell img {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; object-position: center top; pointer-events: none;
      }
      .__hero-shell-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(to bottom, rgba(14,14,14,0.45) 0%, rgba(14,14,14,0.60) 40%, rgba(14,14,14,0.88) 100%);
      }
      .__hero-shell-content {
        position: relative; z-index: 1; width: 100%; min-height: 100vh;
        display: flex; flex-direction: column; justify-content: flex-end;
        padding: 8rem clamp(24px, 6vw, 80px) 5rem clamp(24px, 8vw, 120px);
      }
      .__hero-shell h1 {
        font-family: 'Fraunces', 'Fraunces-fallback', Georgia, serif;
        font-weight: 300; font-style: italic; color: #fff;
        font-size: clamp(36px, 4.5vw, 58px); line-height: 1.05;
        letter-spacing: -0.02em; max-width: 600px;
      }
      .__hero-shell h1 em { font-style: italic; color: #C8354B; }
      /* When React mounts, hide shell instantly */
      body.app-mounted .__hero-shell { display: none; }
    </style>
</head>
  <body>
    <div class="__hero-shell" aria-hidden="true">
      <img src="https://addededucation.com/addedapi/uploads/addededucation-assets/asset_1782658947407_vRwqcjkjJJvZusEeq6lojyQAW3s.png" alt="" fetchpriority="high" decoding="async" />
      <div class="__hero-shell-overlay"></div>
      <div class="__hero-shell-content">
        <h1>Your Child Has One Shot<br />At This Application.<br /><em>Don't Wing It.</em></h1>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
