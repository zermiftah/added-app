    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-text-size-adjust: 100%; }
      body { background: #0E0E0E; color: #fff; font-family: 'Inter', Georgia, sans-serif; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; }
      @font-face {
        font-family: 'Fraunces-fallback';
        src: local('Georgia'), local('Times New Roman');
        size-adjust: 105%; ascent-override: 90%; descent-override: 22%; line-gap-override: 0%;
      }
      /* Static hero shell — paints LCP immediately while React loads */
      .__hero-shell {
        position: fixed; inset: 0; z-index: 9999;
        width: 100%; min-height: 100vh; background: #0E0E0E;
        overflow: hidden; contain: layout style paint;
      }
      .__hero-shell img {
        position: absolute; inset: 0; width: 100%; height: 100%;
        object-fit: cover; object-position: center top; pointer-events: none;
      }
      .__hero-shell-overlay {
        position: absolute; inset: 0;
        background: linear-gradient(to bottom, rgba(14,14,14,0.45) 0%, rgba(14,14,14,0.60) 40%, rgba(14,14,14,0.88) 100%);
      }
      .__hero-shell-content {
        position: relative; z-index: 1; width: 100%; min-height: 100vh;
        display: flex; flex-direction: column; justify-content: flex-end;
        padding: 8rem clamp(24px, 6vw, 80px) 5rem clamp(24px, 8vw, 120px);
      }
      .__hero-shell h1 {
        font-family: 'Fraunces', 'Fraunces-fallback', Georgia, serif;
        font-weight: 300; font-style: italic; color: #fff;
        font-size: clamp(36px, 4.5vw, 58px); line-height: 1.05;
        letter-spacing: -0.02em; max-width: 600px;
      }
      .__hero-shell h1 em { font-style: italic; color: #C8354B; }
      /* When React mounts, hide shell instantly */
      body.app-mounted .__hero-shell { display: none; }
    </style>
</head>
  <body>
    <div class="__hero-shell" aria-hidden="true">
      <img src="https://zmiftah.tech/addedapi/uploads/addededucation-assets/asset_1782567334679_vRwqcjkjJJvZusEeq6lojyQAW3s.webp" alt="" fetchpriority="high" decoding="async" />
      <div class="__hero-shell-overlay"></div>
      <div class="__hero-shell-content">
        <h1>Your Child Has One Shot<br />At This Application.<br /><em>Don't Wing It.</em></h1>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
